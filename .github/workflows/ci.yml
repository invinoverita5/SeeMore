name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract:
    name: Repository contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository guidance files
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "AGENTS.md"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/agent_task.md"
            "docs/architecture.md"
            "docs/testing.md"
          )

          for file in "${required[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error file=$file::missing required repository guidance file"
              exit 1
            fi
          done

          if [ -n "$(find . -path ./.git -prune -o -name AGENTS.md -size 0 -print -quit)" ]; then
            echo "::error::AGENTS.md files must not be empty"
            exit 1
          fi

  node:
    name: Node checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node workspace
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ -f package.json ]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet; skipping Node checks."
          fi

      - name: Setup Node
        if: ${{ steps.detect.outputs.has_node == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and run scripts
        if: ${{ steps.detect.outputs.has_node == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          pm="npm"
          if [ -f pnpm-lock.yaml ]; then
            corepack enable pnpm
            pm="pnpm"
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable yarn
            pm="yarn"
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          scripts="$(node -e "const pkg=require('./package.json'); console.log(Object.keys(pkg.scripts||{}).join(' '))")"
          if [ -z "$scripts" ]; then
            echo "::error::package.json does not define any scripts."
            exit 1
          fi

          for script in lint typecheck test; do
            case " $scripts " in
              *" $script "*) ;;
              *)
                echo "::error::package.json is missing required script: $script"
                exit 1
                ;;
            esac
          done

          for script in lint typecheck test; do
            "$pm" run "$script"
          done

          case " $scripts " in
            *" build "*) "$pm" run build ;;
            *) echo "No build script defined; skipping build." ;;
          esac

  source-guard:
    name: Source stack guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on unsupported source stacks
        shell: bash
        run: |
          set -euo pipefail

          unsupported="$(git ls-files '*.py' '*.go' '*.rs' '*.java' '*.kt' '*.swift' '*.rb' '*.php' '*.cs' '*.fs' '*.vb' '*.scala' 2>/dev/null | head -n 1 || true)"
          if [ -n "$unsupported" ]; then
            echo "::error file=$unsupported::new runtime stack detected. Add install, lint, typecheck, and test CI before merging this source stack."
            exit 1
          fi

          node_source="$(git ls-files '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs' 2>/dev/null | head -n 1 || true)"
          if [ -n "$node_source" ] && [ ! -f package.json ]; then
            echo "::error file=$node_source::Node/TypeScript source exists, but package.json is missing."
            exit 1
          fi
